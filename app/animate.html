<style>
    .border {
        border: none !important;
        position: relative;
        width: 200px;
        height: 220px;
        box-shadow: 5px 5px 15px #0008;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
        overflow: hidden;
        background: #3d3d3d;
        color: #fff;
        font-weight: bold;
    }
    .border::after,
    .border::before {
        content: '';
        position: absolute;
        width: 150%;
        height: 150%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: -1;
    }
    .border::before {
        background: conic-gradient(#44f 20deg, transparent 120deg);
        animation: rotate 4s infinite linear;
    }
    .border::after {
        background: #222;
        width: 95%;
        height: 95%;
        box-shadow: 5px 5px 15px #0008 inset;
        border-radius: 5px;
    }

    @keyframes rotate {
        100% {
            transform: translate(-50%, -50%) rotate(-360deg);
        }
    }
</style>

<div class="container fpad90">
    <div class="vh-100 d-flex align-items-center justify-content-center">
        <div class="border">
            1111
        </div>
    </div>

</div>
